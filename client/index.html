<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API PVP &mdash; Arena Client</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- SETUP SCREEN                                                    -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="setup-screen" class="screen active">
      <div class="setup-container">
        <div class="setup-glow"></div>
        <div class="setup-card">
          <div class="setup-logo">
            <div class="logo-icon">⚔</div>
            <h1>API PVP</h1>
            <p class="subtitle">Real-time arena combat. Code your fighter.</p>
          </div>

          <div class="setup-form">
            <label>
              <span class="label-text">Server URL</span>
              <input
                id="server-url"
                type="url"
                value="https://api-pvp-production.up.railway.app"
                placeholder="https://api-pvp-production.up.railway.app"
                spellcheck="false"
              />
            </label>

            <label>
              <span class="label-text">Player ID (Optional)</span>
              <input
                id="player-id-input"
                type="text"
                placeholder="p_xxxxxx (leave empty to register)"
                spellcheck="false"
                autocomplete="off"
              />
            </label>

            <label>
              <span class="label-text">Username</span>
              <input
                id="username"
                type="text"
                maxlength="20"
                placeholder="Enter your callsign"
                autocomplete="off"
              />
            </label>

            <button id="register-btn" class="btn-primary">
              <span class="btn-text">Connect / Register</span>
              <span class="btn-icon">→</span>
            </button>
            <p id="setup-error" class="error-msg hidden"></p>
          </div>

          <div class="keybind-preview">
            <div class="kb-title">Controls</div>
            <div class="kb-grid">
              <div class="kb-item">
                <div class="kb-keys">
                  <span class="key">W</span><span class="key">A</span
                  ><span class="key">S</span><span class="key">D</span>
                </div>
                <span class="kb-label">Move</span>
              </div>
              <div class="kb-item">
                <div class="kb-keys"><span class="key wide">Space</span></div>
                <span class="kb-label">Shoot (aim angle)</span>
              </div>
              <div class="kb-item">
                <div class="kb-keys"><span class="key">R</span></div>
                <span class="kb-label">Reload</span>
              </div>
              <div class="kb-item">
                <div class="kb-keys">
                  <span class="key sm">↑</span><span class="key sm">←</span>
                  <span class="key sm">↓</span><span class="key sm">→</span>
                </div>
                <span class="kb-label">Shoot cardinal</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- GAME SCREEN                                                     -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="game-screen" class="screen">
      <!-- Full-viewport canvas -->
      <canvas id="arena-canvas"></canvas>

      <!-- Top HUD bar -->
      <header id="hud-top">
        <div class="hud-left">
          <div class="player-badge">
            <div id="player-color-dot" class="color-dot"></div>
            <div class="badge-text">
              <span id="display-name" class="player-name">&mdash;</span>
              <span id="player-id-display" class="player-id">&mdash;</span>
            </div>
          </div>
          <div id="mode-badge" class="mode-badge mode-sandbox">SANDBOX</div>
          <div id="ws-status" class="ws-badge disconnected">
            <span class="ws-dot"></span>
            <span class="ws-label">Connecting</span>
          </div>
        </div>
        <div class="hud-right">
          <button id="disconnect-btn" class="btn-ghost">✕ Disconnect</button>
        </div>
      </header>

      <!-- Stats HUD (bottom-left) -->
      <div id="hud-stats">
        <div class="hud-panel">
          <!-- HP -->
          <div class="stat-block stat-hp-block">
            <div class="stat-header">
              <span class="stat-icon">♥</span>
              <span class="stat-label">HP</span>
              <span id="val-hp" class="stat-value">100</span>
            </div>
            <div class="stat-bar-wrap">
              <div
                id="bar-hp"
                class="stat-bar hp-bar"
                style="width: 100%"
              ></div>
            </div>
          </div>
          <!-- Ammo -->
          <div class="stat-block">
            <div class="stat-header">
              <span class="stat-icon">◆</span>
              <span class="stat-label">AMMO</span>
              <span id="val-ammo" class="stat-value">50/50</span>
            </div>
            <div id="ammo-pips" class="ammo-pips"></div>
          </div>
          <!-- Kills -->
          <div class="stat-block stat-kills-block">
            <div class="stat-header">
              <span class="stat-icon">☠</span>
              <span class="stat-label">KILLS</span>
              <span id="val-kills" class="stat-value big">0</span>
            </div>
          </div>
          <!-- Indicators -->
          <div class="indicator-row">
            <div id="ind-reload" class="indicator">↻ RELOAD</div>
            <div id="ind-dead" class="indicator dead hidden">💀 DEAD</div>
          </div>
        </div>
      </div>

      <!-- Controls HUD (bottom-right) -->
      <div id="hud-controls">
        <div class="hud-panel">
          <!-- Aim pad -->
          <div class="aim-section">
            <div id="aim-pad">
              <div id="aim-line"></div>
              <div id="aim-dot"></div>
              <div id="aim-crosshair-h" class="aim-crosshair"></div>
              <div id="aim-crosshair-v" class="aim-crosshair"></div>
            </div>
            <div class="aim-info">
              <span id="aim-angle-display" class="aim-angle">0°</span>
              <span class="aim-tip">Click pad to fire</span>
            </div>
          </div>
          <!-- WASD visual -->
          <div class="wasd-visual">
            <div class="wasd-row"><div id="k-w" class="kbox">W</div></div>
            <div class="wasd-row">
              <div id="k-a" class="kbox">A</div>
              <div id="k-s" class="kbox">S</div>
              <div id="k-d" class="kbox">D</div>
            </div>
          </div>
          <!-- Other keys -->
          <div class="other-keys">
            <div id="k-space" class="kbox wide">SPACE</div>
            <div id="k-r" class="kbox">R</div>
          </div>
        </div>
      </div>

      <!-- Minimap (top-right) -->
      <div id="hud-minimap">
        <canvas id="minimap-canvas"></canvas>
        <div class="minimap-label">MAP</div>
      </div>

      <!-- Action log (bottom-center) -->
      <div id="hud-log">
        <div id="action-log"></div>
      </div>

      <!-- Last action toast -->
      <div id="last-action-toast" class="action-toast">&mdash;</div>

      <!-- Game over overlay -->
      <div id="game-overlay" class="game-overlay hidden">
        <div class="overlay-content">
          <div id="overlay-icon" class="overlay-icon"></div>
          <h2 id="overlay-title"></h2>
          <p id="overlay-sub"></p>
        </div>
      </div>
    </div>

    <script src="client.js?v=2"></script>
  </body>
</html>
